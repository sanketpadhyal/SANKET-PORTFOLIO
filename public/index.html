<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="description" content="Portfolio Web" />
    <meta name="theme-color" content="#f5f5f5" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        var storageKey = "preferred-theme";
        var savedTheme = null;

        try {
          savedTheme = window.localStorage.getItem(storageKey);
        } catch (error) {}

        var theme = savedTheme === "dark" || savedTheme === "light"
          ? savedTheme
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document.addEventListener("DOMContentLoaded", function () {
          document.body.dataset.theme = theme;
          document.body.style.colorScheme = theme;
        });

        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.setAttribute("content", theme === "dark" ? "#0a0a0a" : "#f5f5f5");
        }
      })();
    </script>
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/assets/sanket.webp" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Sanket Padhyal | Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
